name: Deploy Shinylive to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install R packages
        run: |
          install.packages(c("shinylive", "bslib", "tidyverse", "httr", "jsonlite", "glue", "htmltools"), repos = "https://cran.r-project.org")
        shell: Rscript {0}

      - name: Export Shinylive
        run: |
          shinylive::export(".", "_site")
        shell: Rscript {0}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
